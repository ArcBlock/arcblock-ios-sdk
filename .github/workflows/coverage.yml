name: Code Coverage

# 当提交不需要打版本的commit时，只需要不bump version，则后续fastlane action不会触发

on:
  pull_request:
    branches: [master]

  workflow_dispatch:

jobs:
  build:
    name: Start Coverage Test
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v2
      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'
      - name: Install iOS Simulator runtime if missing
        run: |
          if xcrun simctl list runtimes | grep -q "iOS "; then
            echo "iOS runtime already installed:"
            xcrun simctl list runtimes | grep iOS
          else
            echo "No iOS runtime found, downloading..."
            xcodebuild -downloadPlatform iOS
          fi
      - name: List available simulators
        run: xcrun simctl list devices available | head -50
      - name: Install Dependency
        run: |
          bundle update
          pod install
      - name: Run tests
        uses: sersoft-gmbh/xcodebuild-action@v1
        with:
          workspace: ArcBlockSDK.xcworkspace
          sdk: iphonesimulator
          destination: "platform=iOS Simulator,name=iPhone 15"
          configuration: Debug
          scheme: ArcBlockSDK
          action: test
          enable-code-coverage: true
      - name: Generate Coverage Report
        run: |
          fastlane code_coverage
      - name: Comment PR
        uses: NejcZdovc/comment-pr@v1
        with:
          file: cov_reports/report.md
